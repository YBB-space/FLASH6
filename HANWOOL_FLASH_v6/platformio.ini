[env:esp32-s3-devkitc-1-n16r8v]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8v
framework = arduino

; =========================
; HW / Build
; =========================
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_build.filesystem = littlefs
board_build.partitions = partitions_16mb_lfs.csv
; (선택) flash 옵션(보드가 기본값이면 굳이 안 건드려도 됨)
; board_build.flash_mode = qio
; board_build.flash_freq = 80m

; (권장) 라이브러리 충돌 줄이기
lib_compat_mode = strict
lib_ldf_mode = chain

; =========================
; Flags
; =========================
build_flags =
  ; USB CDC(대시보드 WebSerial/USB 통신용)
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

  ; (선택) 디버그 레벨
  ; -DCORE_DEBUG_LEVEL=1

  ; (주의) 아래 2개는 "AsyncTCP" 계열에서 도움이 될 때가 있는데,
  ; 프로젝트가 ESPAsyncWebServer/AsyncTCP를 실제로 쓰는 경우에만 의미 있음.
  ; WebServer(동기)만 쓰면 굳이 필요 없음.
  -D CONFIG_ASYNC_TCP_RUNNING_CORE=1
  -D CONFIG_ASYNC_TCP_STACK_SIZE=4096

; =========================
; Serial Monitor
; =========================
; 대시보드 WebSerial이 460800로 열기 때문에, 개발 로그도 맞춰두는 게 편함
monitor_speed = 460800

; 모니터 연결 시 보드가 리셋되는 것 방지(USB CDC 환경에서 특히 유용)
monitor_rts = 0
monitor_dtr = 0

; (추천) 예외 디코딩 + 타임스탬프 + 컬러
monitor_filters =
  esp32_exception_decoder
  time
  colorize

; =========================
; Upload
; =========================
upload_speed  = 921600
upload_port   = /dev/cu.usbmodem101
monitor_port  = /dev/cu.usbmodem101

; =========================
; Libs
; =========================
lib_deps =
  bogde/HX711 @ ^0.7.5
  https://github.com/ESP32Async/AsyncTCP.git
  https://github.com/ESP32Async/ESPAsyncWebServer.git

; =========================
; LittleFS Upload Script
; =========================
extra_scripts = auto_uploadfs.py
